steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west9-docker.pkg.dev/$PROJECT_ID/mlops-repo/app:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west9-docker.pkg.dev/$PROJECT_ID/mlops-repo/app:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - mlops-app
      - --image=europe-west9-docker.pkg.dev/$PROJECT_ID/mlops-repo/app:$COMMIT_SHA
      - --region=europe-west9
      - --platform=managed
      - --allow-unauthenticated