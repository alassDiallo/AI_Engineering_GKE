steps:
  - name: hashicorp/terraform:1.9
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform-config
        terraform init

  - name: hashicorp/terraform:1.9
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform-config
        terraform plan

options:
  logging: CLOUD_LOGGING_ONLY